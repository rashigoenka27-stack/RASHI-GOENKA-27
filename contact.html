<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Rashi Goenka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Smooth selection */
        ::selection { background: white; color: black; }

        /* Ensure menu is hidden off-screen properly for script.js */
        #menu {
            position: fixed;
            inset: 0;
            z-index: 80;
            transform: translateX(100%);
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Initial state for reveal animation */
        .reveal-text { opacity: 0; transform: translateY(50px); }
    </style>
</head>
<body class="bg-zinc-950 text-white selection:bg-white selection:text-black overflow-x-hidden">
    
    <div class="custom-cursor" id="cursor"></div>

    <nav class="fixed top-0 w-full p-6 md:px-12 flex justify-between items-center z-[70] backdrop-blur-md bg-black/20 border-b border-white/5">
        <a href="index.html" class="flex items-center">
            <img src="rrr.png" alt="Rashi Goenka Logo" class="h-8 md:h-10 w-auto object-contain">
        </a>
        
        <div class="hidden md:flex gap-8 items-center font-bold text-sm tracking-widest uppercase">
            <a href="index.html" class="hover:text-zinc-500 transition">HOME</a>
            <a href="work.html" class="hover:text-zinc-500 transition">WORK</a>
            <a href="skills.html" class="hover:text-zinc-500 transition">SKILLS</a>
            <a href="about.html" class="hover:text-zinc-500 transition">ABOUT</a>
            <a href="contact.html" class="bg-white text-black px-5 py-2 rounded-full text-xs">CONTACT</a>
        </div>

        <button id="menu-btn" class="md:hidden flex flex-col gap-1.5 items-end group z-[90]">
            <span class="w-8 h-0.5 bg-white group-hover:w-10 transition-all"></span>
            <span class="w-5 h-0.5 bg-white"></span>
        </button>
    </nav>

    <div id="menu" class="bg-zinc-950">
        <button id="close-btn" class="absolute top-8 right-8 text-4xl hover:text-zinc-500 transition">&times;</button>
        <div class="flex flex-col gap-6 text-center">
            <a href="index.html" class="menu-link text-5xl font-black text-white hover:text-zinc-500 transition uppercase tracking-tighter">Home</a>
            <a href="work.html" class="menu-link text-5xl font-black text-white hover:text-zinc-500 transition uppercase tracking-tighter">Work</a>
            <a href="skills.html" class="menu-link text-5xl font-black text-white hover:text-zinc-500 transition uppercase tracking-tighter">Skills</a>
            <a href="about.html" class="menu-link text-5xl font-black text-white hover:text-zinc-500 transition uppercase tracking-tighter">About</a>
            <a href="contact.html" class="menu-link text-5xl font-black text-white hover:text-zinc-500 transition uppercase tracking-tighter">Contact</a>
        </div>
    </div>

    <main class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-20 relative z-10">
        <div class="reveal-text">
            <h1 class="text-6xl md:text-8xl lg:text-9xl font-black tracking-tighter mb-6 md:mb-10 uppercase">
                SAY HI<span class="text-zinc-800">.</span>
            </h1>
            
            <a href="mailto:rashigoenka27@gmail.com" 
               class="text-lg md:text-4xl lg:text-5xl font-bold underline decoration-zinc-800 hover:text-zinc-500 transition break-all block max-w-4xl mx-auto uppercase">
                rashigoenka27@gmail.com
            </a>

            <div class="mt-12 md:mt-20 flex flex-wrap justify-center gap-6 md:gap-10">
                <a href="https://www.behance.net/rashigoenka" target="_blank" class="font-bold text-zinc-500 hover:text-white tracking-widest text-sm md:text-base transition">BEHANCE</a>
                <a href="https://www.linkedin.com/in/rashi-goenka-34b42027a/" target="_blank" class="font-bold text-zinc-500 hover:text-white tracking-widest text-sm md:text-base transition">LINKEDIN</a>
            </div>
        </div>
    </main>

    <footer class="bg-black py-12 px-6 md:px-12 border-t border-white/10 relative z-10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-zinc-600 font-mono text-[10px] md:text-xs uppercase tracking-widest">
            <p>© 2026 Rashi Goenka. All Rights Reserved.</p>
            <div class="flex gap-6">
                <a href="#" id="back-to-top" class="hover:text-white transition">Back to top</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // GSAP ENTRANCE ANIMATION
            gsap.to(".reveal-text", {
                y: 0,
                opacity: 1,
                duration: 1.5,
                ease: "expo.out",
                delay: 0.2
            });

            // Back to top helper
            document.getElementById('back-to-top').addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
